  url_launcher: ^6.3.2
  uuid: 4.5.3
  web: any
  webview_flutter: ^4.13.1
  zoom_tap_animation: ^1.1.0
dependency_overrides:
  intl: ^0.20.2
  webview_flutter: ^4.13.1
  js: ^0.7.2
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/background/
    - assets/icons/
    - assets/animation/
