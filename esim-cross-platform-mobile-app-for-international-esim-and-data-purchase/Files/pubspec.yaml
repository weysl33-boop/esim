name: esim
description: "Esim Mobile Application."

publish_to: "none"

version: 1.0.5+6

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  awesome_dialog: ^3.3.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  dotted_border: ^3.1.0
  dotted_line: ^3.2.3
  downloadsfolder: ^1.2.0
  equatable: ^2.0.8
  file_picker: ^10.3.10
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^20.1.0
  flutter_secure_storage: ^10.0.0
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  flutter_widget_from_html: ^0.17.1
  get: ^4.7.3
  google_sign_in: ^7.2.0
  http: ^1.6.0
  image_gallery_saver_plus: ^4.0.1
  intl: 0.20.2
  introduction_screen: ^4.0.0
  open_file: ^3.5.11
  path_provider: ^2.1.5
